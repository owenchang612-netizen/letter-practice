
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');
  :root {
    --teal:#2ABFBF;--teal-d:#1A9090;--teal-dd:#0D6060;
    --coral:#FF6B6B;
    --card:#fff;
    --shadow:0 4px 20px rgba(42,191,191,0.18);
    --shadow-lg:0 8px 32px rgba(42,191,191,0.28);
    --radius:20px;
    --green:#43A047;--green-l:#E8F5E9;
    --orange:#FF7043;--gold:#FFD600;--gold-l:#FFFBE6;
    --bg1:#EAF9F9;--bg2:#F0F7FF;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:#B3D8A3;min-height:100vh;display:flex;flex-direction:column;}

  .topbar{background:linear-gradient(135deg,var(--teal-dd),var(--teal-d),var(--teal));padding:12px 16px 10px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(13,96,96,.3);}
  .back-btn{width:36px;height:36px;background:rgba(255,255,255,.2);border:none;border-radius:12px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .topbar-title{font-family:'Fredoka One',cursive;font-size:18px;color:#fff;flex:1;}
  .star-counter{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.18);border-radius:20px;padding:5px 10px;flex-shrink:0;}
  .star-pip{font-size:15px;}
  .star-pip.pop{animation:starPop .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes starPop{0%{transform:scale(.5) rotate(-20deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1)}}

  .group-tabs{display:flex;gap:0;margin:10px 14px 0;background:#A4D6C1;border-radius:16px;padding:4px;box-shadow:var(--shadow);border:1.5px solid #A4D6C1;}
  .group-tab{flex:1;height:38px;border-radius:12px;border:none;cursor:pointer;font-family:'Fredoka One',cursive;font-size:12px;transition:all .22s cubic-bezier(.34,1.56,.64,1);color:var(--teal-d);background:transparent;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;}
  .group-tab.active{background:linear-gradient(135deg,var(--teal-d),var(--teal-dd));color:#fff;box-shadow:0 2px 10px rgba(13,96,96,.3);}
  .group-tab .done-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:none;flex-shrink:0;}
  .group-tab.grp-done .done-dot{display:block;}

  .shape-selector{padding:8px 14px 4px;}
  .selector-label{font-size:11px;font-weight:700;color:var(--teal-dd);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
  .reroll-btn{background:var(--teal-d);color:#fff;border:none;border-radius:8px;font-size:10px;font-weight:800;font-family:'Nunito',sans-serif;padding:3px 8px;cursor:pointer;display:none;}
  .reroll-btn.show{display:block;}
  .shape-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;}
  .shape-tabs::-webkit-scrollbar{display:none;}
  .shape-tab{flex-shrink:0;width:52px;height:52px;border-radius:14px;border:2.5px solid transparent;background:#A4D6C1;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 2px 8px rgba(42,191,191,.2);position:relative;}
  .shape-tab.active{background:linear-gradient(135deg,var(--teal-d),var(--teal-dd));border-color:var(--teal-dd);transform:scale(1.1);box-shadow:0 4px 16px rgba(13,96,96,.35);}
  .shape-tab.pass::after{content:'✓';position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--green);color:#fff;border-radius:50%;font-size:7px;display:flex;align-items:center;justify-content:center;}
  .shape-tab.fail::after{content:'△';position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--orange);color:#fff;border-radius:50%;font-size:7px;display:flex;align-items:center;justify-content:center;}
  .shape-tab svg{width:22px;height:22px;transition:filter .18s;}
  .shape-tab.active svg{filter:brightness(10);}
  .shape-tab .char-icon{font-size:22px;font-weight:900;color:var(--teal-d);line-height:1;transition:color .18s;}
  .shape-tab.active .char-icon{color:#fff;}
  .shape-tab-label{font-size:9px;font-weight:700;color:var(--teal-d);line-height:1;text-align:center;}
  .shape-tab.active .shape-tab-label{color:#fff;}

  .round-header{background:#A4D6C1;margin:8px 14px 0;border-radius:var(--radius);box-shadow:var(--shadow);padding:10px 14px;display:none;border:1.5px solid #A4D6C1;}
  .round-header.visible{display:block;}
  .round-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .round-label{font-family:'Fredoka One',cursive;font-size:13px;color:var(--teal-dd);}
  .round-badge{background:#A4D6C1;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;color:var(--teal-dd);}
  .round-track{display:flex;gap:4px;}
  .round-cell{flex:1;min-width:26px;height:30px;border-radius:9px;border:2px solid #A4D6C1;background:#A4D6C1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;transition:all .25s;cursor:pointer;font-size:14px;}
  .round-cell.current{border-color:var(--teal);background:#A4D6C1;transform:scale(1.05);}
  .round-cell.pass{border-color:#A5D6A7;background:var(--green-l);}
  .round-cell.fail{border-color:#FFCC80;background:#FFF3E0;}
  .rc-icon{font-size:8px;line-height:1;}
  .threshold-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .th-label{font-size:10px;font-weight:700;color:var(--teal-d);white-space:nowrap;}
  .th-bar-bg{flex:1;height:6px;background:#A4D6C1;border-radius:6px;overflow:hidden;position:relative;}
  .th-bar-fill{height:100%;border-radius:6px;transition:width .5s;background:linear-gradient(90deg,#F08080,var(--gold),var(--green));}
  .th-marker{position:absolute;top:-3px;left:80%;width:2px;height:12px;background:var(--teal-dd);border-radius:2px;opacity:.6;}
  .th-pct{font-size:11px;font-weight:800;min-width:32px;text-align:right;color:var(--teal-d);}

  .practice-area{padding:6px 14px;}
  .canvas-card{background:#A4D6C1;border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;border:1.5px solid #A4D6C1;}
  .shape-header{display:flex;align-items:center;padding:10px 14px 8px;gap:12px;border-bottom:2px dashed #A4D6C1;}
  .shape-preview-box{width:68px;height:68px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,#A4D6C1,#A8E6CF);display:flex;align-items:center;justify-content:center;}
  .shape-preview-box svg{width:44px;height:44px;}
  .shape-preview-box .preview-char{font-size:40px;font-weight:900;color:var(--teal-dd);line-height:1;}
  .shape-info{flex:1;}
  .shape-name-zh{font-family:'Fredoka One',cursive;font-size:22px;color:var(--teal-dd);line-height:1;}
  .shape-name-en{font-size:13px;font-weight:700;color:var(--teal-d);margin-top:3px;}
  .shape-desc{font-size:11px;font-weight:600;color:#80B8B8;margin-top:3px;line-height:1.4;}
  .mode-toggle{display:flex;flex-direction:column;gap:4px;align-items:flex-end;justify-content:center;}
  .trace-btn{padding:4px 9px;border-radius:10px;border:2px solid transparent;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;cursor:pointer;transition:all .18s;white-space:nowrap;}
  .trace-btn.active-mode{background:var(--teal-d);color:#fff;border-color:var(--teal-dd);}
  .trace-btn:not(.active-mode){background:#A4D6C1;color:var(--teal-d);border-color:#A4D6C1;}

  .guide-status{display:none;align-items:center;gap:8px;padding:7px 12px;background:linear-gradient(90deg,var(--teal-dd),var(--teal-d));}
  .guide-status.visible{display:flex;}
  .guide-status-txt{font-family:'Fredoka One',cursive;font-size:12px;color:#fff;flex:1;}
  .guide-stroke-badge{background:rgba(255,255,255,.25);border-radius:20px;padding:3px 8px;font-size:10px;font-weight:800;color:#fff;}
  .guide-skip-btn{background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;font-size:10px;font-weight:800;cursor:pointer;padding:4px 8px;font-family:'Nunito',sans-serif;}
  .canvas-wrap{
    position:relative;
    background:#A4D6C1;
    /* 固定高度，確保所有絕對定位子元素有明確的參考容器 */
  }

  /* Grid SVG: 填滿整個 canvas-wrap */
  .canvas-grid{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    width:100%;height:100%;
    pointer-events:none;z-index:0;
  }

  /* ★ ghost canvas: 用 canvas 元素取代 div/svg，確保精確置中 ★ */
  canvas#ghostCanvas{
    position:absolute;
    top:0;left:0;
    z-index:1;
    pointer-events:none;
    display:block;
  }

  canvas#guideCanvas{
    position:absolute;
    top:0;left:0;
    z-index:3;
    pointer-events:none;
    display:block;
  }

  canvas#drawCanvas{
    display:block;
    width:100%;
    height:210px;
    cursor:crosshair;
    position:relative;
    z-index:2;
    touch-action:none;
  }

  .ink-nib{position:absolute;z-index:10;pointer-events:none;display:none;width:26px;height:26px;}
  .stroke-guide{position:absolute;top:6px;left:6px;display:flex;gap:4px;z-index:5;pointer-events:none;}
  .stroke-dot{width:22px;height:22px;border-radius:50%;background:var(--teal-d);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(42,191,191,.4);transition:background .3s,transform .2s;}
  .stroke-dot.active-stroke{background:var(--coral);transform:scale(1.15);}
  .stroke-dot.done-stroke{background:var(--green);}

  .quality-bar-row{display:flex;align-items:center;gap:8px;padding:7px 14px;border-top:2px dashed #A4D6C1;}
  .quality-label{font-size:11px;font-weight:700;color:var(--teal-d);white-space:nowrap;}
  .quality-bar-bg{flex:1;height:8px;background:#A4D6C1;border-radius:8px;overflow:hidden;position:relative;}
  .quality-bar-fill{height:100%;border-radius:8px;transition:width .4s,background .4s;}
  .quality-bar-threshold{position:absolute;top:-2px;left:80%;width:2px;height:12px;background:var(--teal-dd);border-radius:2px;opacity:.5;}
  .quality-pct{font-size:12px;font-weight:800;min-width:32px;text-align:right;color:var(--teal-d);}

  .controls{display:flex;gap:5px;padding:6px 14px;}
  .ctrl-btn{flex:1;height:44px;border-radius:13px;border:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .18s;box-shadow:0 3px 10px rgba(42,191,191,.2);}
  .ctrl-btn:active{transform:scale(.96);}
  .btn-clear{background:var(--gold-l);color:#B8860B;border:2px solid #F0D060;}
  .btn-guide{background:linear-gradient(135deg,var(--teal-dd),var(--teal-d));color:#fff;border:2px solid var(--teal-dd);box-shadow:0 4px 14px rgba(13,96,96,.3);}
  .btn-guide.animating{background:linear-gradient(135deg,var(--coral),#FF9090);border-color:var(--coral);}
  .btn-hint{background:#A4D6C1;color:var(--teal-dd);border:2px solid #A8E6CF;}
  .btn-check{flex:2;background:linear-gradient(135deg,#43A047,#2E7D32);color:#fff;border:2px solid #1B5E20;font-size:13px;box-shadow:0 4px 16px rgba(67,160,71,.3);}

  .bottom-bar{padding:6px 14px 14px;margin-top:auto;}
  .btn-exit{width:100%;height:44px;border-radius:14px;border:2px solid #A8E6CF;background:#A4D6C1;color:var(--teal-d);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);transition:all .18s;}
  .btn-exit:hover{background:#A4D6C1;}

  .confirm-bg{position:fixed;inset:0;background:rgba(13,96,96,.35);z-index:250;display:none;align-items:flex-end;justify-content:center;}
  .confirm-bg.show{display:flex;}
  .confirm-sheet{background:#A4D6C1;border-radius:24px 24px 0 0;width:100%;max-width:720px;padding:22px 18px 28px;animation:sheetUp .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .confirm-icon{font-size:36px;text-align:center;margin-bottom:8px;}
  .confirm-title{font-family:'Fredoka One',cursive;font-size:19px;color:var(--teal-dd);text-align:center;margin-bottom:5px;}
  .confirm-sub{font-size:12px;color:var(--teal-d);text-align:center;font-weight:600;margin-bottom:16px;line-height:1.5;}
  .confirm-btns{display:flex;gap:10px;}
  .confirm-btn{flex:1;height:46px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
  .btn-stay{background:#A4D6C1;color:var(--teal-dd);border:2px solid #A8E6CF;}
  .btn-leave{background:linear-gradient(135deg,var(--teal-d),var(--teal-dd));color:#fff;border:2px solid var(--teal-dd);}

  .star-modal-bg{position:fixed;inset:0;background:rgba(13,96,96,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
  .star-modal-bg.show{display:flex;}
  .star-modal{background:#B3D8A3;border-radius:28px;width:100%;max-width:720px;padding:24px 18px 20px;text-align:center;animation:modalIn .5s cubic-bezier(.34,1.56,.64,1);border:2px solid var(--teal);}
  @keyframes modalIn{from{transform:scale(.6) rotate(-5deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
  .star-award-big{font-size:64px;animation:starFloat 1s ease-in-out infinite alternate;display:block;margin-bottom:6px;}
  @keyframes starFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-7px) scale(1.05)}}
  .star-award-title{font-family:'Fredoka One',cursive;font-size:22px;color:var(--teal-dd);margin-bottom:4px;}
  .star-award-group{font-family:'Fredoka One',cursive;font-size:16px;color:var(--teal-dd);background:#A8E6CF;border-radius:10px;padding:3px 12px;display:inline-block;margin-bottom:14px;}
  .star-award-btns{display:flex;gap:7px;}
  .star-award-btn{flex:1;height:42px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
  .saw-retry{background:#A4D6C1;color:var(--teal-dd);border:2px solid #A8E6CF;}
  .saw-next{background:linear-gradient(135deg,var(--teal-d),var(--teal-dd));color:#fff;border:2px solid var(--teal-dd);}

  .score-modal-bg{position:fixed;inset:0;background:rgba(13,96,96,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:14px;}
  .score-modal-bg.show{display:flex;}
  .score-modal{background:#A4D6C1;border-radius:22px;width:100%;max-width:720px;overflow:hidden;max-height:92vh;overflow-y:auto;animation:modalIn .4s cubic-bezier(.34,1.56,.64,1);border:2px solid #A4D6C1;}
  .modal-header{padding:14px 16px 10px;text-align:center;background:#B3D8A3;}
  .modal-emoji{font-size:42px;line-height:1;margin-bottom:5px;}
  .modal-title{font-family:'Fredoka One',cursive;font-size:21px;line-height:1.1;}
  .modal-title.pass{color:var(--green);}
  .modal-title.fail{color:var(--orange);}
  .modal-sub{font-size:11px;font-weight:600;color:var(--teal-d);margin-top:3px;}
  .donut-wrap{display:flex;justify-content:center;margin:6px 0;}
  .donut-svg{width:90px;height:90px;}
  .donut-bg{fill:none;stroke:#A4D6C1;stroke-width:11;}
  .donut-fill{fill:none;stroke-width:11;stroke-linecap:round;transform:rotate(-90deg);transform-origin:45px 45px;transition:stroke-dasharray 1s cubic-bezier(.34,1.56,.64,1);}
  .donut-pct{font-family:'Fredoka One',cursive;font-size:18px;fill:var(--teal-dd);}
  .donut-label{font-size:9px;fill:var(--teal-d);font-family:'Nunito',sans-serif;}
  .breakdown{padding:0 14px 4px;}
  .bd-title{font-size:10px;font-weight:700;color:var(--teal-d);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
  .breakdown-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px;}
  .bd-cell{border-radius:8px;padding:6px 3px;text-align:center;border:2px solid transparent;}
  .bd-cell.b-pass{background:var(--green-l);border-color:#A5D6A7;}
  .bd-cell.b-fail{background:#FFF3E0;border-color:#FFCC80;}
  .bd-cell.b-empty{background:#A4D6C1;border-color:#A4D6C1;}
  .bd-shape{display:flex;align-items:center;justify-content:center;height:22px;font-size:16px;}
  .bd-q{font-size:9px;font-weight:700;margin-top:2px;}
  .bd-cell.b-pass .bd-q{color:#558B2F;}
  .bd-cell.b-fail .bd-q{color:#E65100;}
  .tips-section{background:#FFFBE6;border-radius:10px;margin:0 14px 8px;padding:9px;border:2px solid #F0D060;}
  .tips-title{font-family:'Fredoka One',cursive;font-size:12px;color:#B8860B;margin-bottom:5px;}
  .tip-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;}
  .tip-icon{width:18px;height:18px;border-radius:50%;background:var(--orange);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .tip-text{font-size:11px;color:#5D4037;line-height:1.5;font-weight:600;}
  .modal-btns{display:flex;gap:7px;padding:5px 14px 14px;}
  .modal-btn{flex:1;height:42px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:all .18s;}
  .modal-btn:active{transform:scale(.96);}
  .btn-retry{background:#FFFBE6;color:#B8860B;border:2px solid #F0D060;}
  .btn-retry.hidden{display:none;}
  .btn-reroll{background:#A4D6C1;color:var(--teal-dd);border:2px solid #A8E6CF;}
  .btn-reroll.hidden{display:none;}
  .btn-next{background:linear-gradient(135deg,#43A047,#2E7D32);color:#fff;border:2px solid #1B5E20;}

  .starburst{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:350;display:none;}
  .starburst.show{display:block;}
  .burst-particle{position:absolute;font-size:20px;animation:burstFly 1.4s ease-out forwards;}
  @keyframes burstFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2)}}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="confirmExit()">←</button>
  <div class="topbar-title">描繪形狀練習 ✏️</div>
  <div class="star-counter">
    <span class="star-pip" id="s1">☆</span>
    <span class="star-pip" id="s2">☆</span>
    <span class="star-pip" id="s3">☆</span>
  </div>
</div>

<div class="group-tabs">
  <button class="group-tab active" id="tab0" onclick="switchGroup(0)"><span class="done-dot"></span>⭕ 基礎型</button>
  <button class="group-tab" id="tab1" onclick="switchGroup(1)"><span class="done-dot"></span>⬡ 多邊形</button>
  <button class="group-tab" id="tab2" onclick="switchGroup(2)"><span class="done-dot"></span>✦ 變化型</button>
</div>

<div class="shape-selector">
  <div class="selector-label">
    <span id="selectorLabel">選擇形狀</span>
    <button class="reroll-btn" id="rerollBtn" onclick="rerollShapes()">🔀 換題</button>
  </div>
  <div class="shape-tabs" id="shapeTabs"></div>
</div>

<div class="round-header" id="roundHeader">
  <div class="round-top">
    <div class="round-label">本題進度</div>
    <div class="round-badge" id="roundBadge">0 / 5</div>
  </div>
  <div class="round-track" id="roundTrack"></div>
  <div class="threshold-row">
    <div class="th-label">良率</div>
    <div class="th-bar-bg"><div class="th-bar-fill" id="roundFill" style="width:0%"></div><div class="th-marker"></div></div>
    <div class="th-pct" id="roundPct">0%</div>
  </div>
</div>

<div class="practice-area">
  <div class="canvas-card">
    <div class="shape-header">
      <div class="shape-preview-box" id="previewBox">
        <svg viewBox="0 0 44 44" fill="none"></svg>
      </div>
      <div class="shape-info">
        <div class="shape-name-zh" id="shapeNameZh">圓形</div>
        <div class="shape-name-en" id="shapeNameEn">Circle</div>
        <div class="shape-desc" id="shapeDesc">從任意一點開始，畫一個封閉的圓形</div>
      </div>
      <div class="mode-toggle">
        <button class="trace-btn active-mode" onclick="setTraceMode('trace')" id="btnTrace">✏️ 描摹</button>

<script>
// ── SHAPE DATA ─────────────────────────────────────────────────────────────────
const SHAPES = {
  cross:     { id:'cross',     grp:0, nameZh:'打叉',       nameEn:'Cross (✕)',           emoji:'✕',  desc:'兩條對角線交叉，從左上到右下，再從右上到左下',     svgPath:`<line x1="12" y1="12" x2="36" y2="36" stroke="#2ABFBF" stroke-width="5" stroke-linecap="round"/><line x1="36" y1="12" x2="12" y2="36" stroke="#2ABFBF" stroke-width="5" stroke-linecap="round"/>`, guideStrokes:[[[.2,.2],[.8,.8]],[[.8,.2],[.2,.8]]], useChar:false },

  rhombus:   { id:'rhombus',   grp:1, nameZh:'菱形',       nameEn:'Rhombus',              emoji:'◆',  desc:'四條等長邊，角度傾斜',                             svgPath:`<polygon points="22,5 39,22 22,39 5,22" stroke="#2ABFBF" stroke-width="5" fill="none" stroke-linejoin="round"/>`, guideStrokes:[[[.50,.12],[.88,.50],[.50,.88],[.12,.50],[.50,.12]]], useChar:false },
  pentagon:  { id:'pentagon',  grp:1, nameZh:'五邊形',     nameEn:'Pentagon',             emoji:'⬠',  desc:'五條等長的邊，五個角',                             svgPath:`<polygon points="22,5 39,17 33,37 11,37 5,17" stroke="#2ABFBF" stroke-width="5" fill="none" stroke-linejoin="round"/>`, guideStrokes:[[[.50,.12],[.87,.38],[.74,.82],[.26,.82],[.13,.38],[.50,.12]]], useChar:false },
  hexagon:   { id:'hexagon',   grp:1, nameZh:'六角形',     nameEn:'Hexagon',              emoji:'⬡',  desc:'六條等長的邊，正六角形',                           svgPath:`<polygon points="22,4 38,13 38,31 22,40 6,31 6,13" stroke="#2ABFBF" stroke-width="5" fill="none" stroke-linejoin="round"/>`, guideStrokes:[[[.50,.10],[.84,.28],[.84,.68],[.50,.86],[.16,.68],[.16,.28],[.50,.10]]], useChar:false },
  bagua:     { id:'bagua',     grp:2, nameZh:'八卦形',     nameEn:'Octagram',             emoji:'⊛',  desc:'八個角的星形，由兩個正方形重疊旋轉',               svgPath:`<polygon points="22,4 27,16 39,16 30,24 33,37 22,30 11,37 14,24 5,16 17,16" stroke="#2ABFBF" stroke-width="4" fill="none" stroke-linejoin="round"/>`, guideStrokes:[[[.50,.10],[.61,.35],[.88,.35],[.67,.54],[.75,.80],[.50,.65],[.25,.80],[.33,.54],[.12,.35],[.39,.35],[.50,.10]]], useChar:false },

  star5:     { id:'star5',     grp:2, nameZh:'五芒星',     nameEn:'Five-pointed Star',    emoji:'⭐', desc:'五個尖角的星形，從頂點開始交叉畫',                 svgPath:`<polygon points="22,4 27,18 41,18 30,27 34,41 22,32 10,41 14,27 3,18 17,18" stroke="#2ABFBF" stroke-width="4" fill="none" stroke-linejoin="round"/>`, guideStrokes:[[[.50,.10],[.61,.40],[.90,.40],[.68,.58],[.77,.88],[.50,.70],[.23,.88],[.32,.58],[.10,.40],[.39,.40],[.50,.10]]], useChar:false },
  star6:     { id:'star6',     grp:2, nameZh:'六芒星',     nameEn:'Six-pointed Star',     emoji:'✡',  desc:'兩個相對三角形重疊，先畫上三角，再畫下三角',       svgPath:`<polygon points="22,4 28,15 40,15 32,24 40,33 28,33 22,44 16,33 4,33 12,24 4,15 16,15" stroke="#2ABFBF" stroke-width="4" fill="none" stroke-linejoin="round"/>`, guideStrokes:[[[.50,.10],[.86,.68],[.14,.68],[.50,.10]],[[.50,.90],[.14,.32],[.86,.32],[.50,.90]]], useChar:false },
  concave:   { id:'concave',   grp:2, nameZh:'凹形',       nameEn:'Concave (凹)',         emoji:'凹', desc:'照著「凹」字的筆畫，描繪出凹陷的形狀', char:'凹', useChar:true, guideStrokes:[[[.18,.20],[.18,.82],[.82,.82],[.82,.20],[.62,.20],[.62,.50],[.38,.50],[.38,.20],[.18,.20]]] },
  convex:    { id:'convex',    grp:2, nameZh:'凸形',       nameEn:'Convex (凸)',          emoji:'凸', desc:'照著「凸」字的筆畫，描繪出凸起的形狀', char:'凸', useChar:true, guideStrokes:[[[.18,.82],[.18,.50],[.10,.50],[.10,.20],[.90,.20],[.90,.50],[.82,.50],[.82,.82],[.18,.82]],[[.38,.50],[.62,.50]],[[.38,.20],[.38,.50]],[[.62,.20],[.62,.50]]] },
  dollar:    { id:'dollar',    grp:2, nameZh:'Dollar符號', nameEn:'Dollar Sign ($)',      emoji:'💲', desc:'畫S形，再加上一條穿過的垂直線',                     svgPath:`<path d="M32,10 C28,6 18,7 14,12 C10,17 14,22 22,24 C30,26 34,31 30,37 C26,43 16,44 12,40" stroke="#2ABFBF" stroke-width="4" fill="none" stroke-linecap="round"/><line x1="22" y1="4" x2="22" y2="44" stroke="#2ABFBF" stroke-width="4" stroke-linecap="round"/>`, guideStrokes:[[[.68,.22],[.58,.14],[.45,.16],[.32,.18],[.28,.28],[.32,.36],[.50,.44],[.65,.46],[.70,.58],[.68,.68],[.58,.84],[.46,.88],[.35,.82],[.30,.76]],[[.50,.10],[.50,.90]]], useChar:false },
};

const GROUPS=[
  {id:0,label:'基礎型',shapes:['cross','check','circle','ellipse','triangle'],pick:5,reroll:false},
  {id:1,label:'多邊形',shapes:['square','rectangle','trapezoid','rhombus','pentagon','hexagon'],pick:4,reroll:true},
  {id:2,label:'變化型',shapes:['bagua','heart','star5','star6','concave','convex','dollar'],pick:3,reroll:true},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentGrp=0,currentQueue=[],currentIdx=0,results=[];
let traceMode='trace',isDrawing=false,isGuiding=false,guideAnimId=null,guideSpeed=0.6,totalStrokePts=0;
let groupDone=[false,false,false];
const SL=['🐌 很慢','🐢 慢','🚶 普通','🚀 快','⚡ 很快'],SV=[0.35,0.6,1.0,1.6,2.5];
const PP=['畫得超棒！','太厲害了！','形狀高手！'],FE=['再試試看！','繼續練習！','差一點就成功了！'];
function currentShape(){return SHAPES[currentQueue[currentIdx]];}
function buildQueue(gi){const g=GROUPS[gi];return[...g.shapes].sort(()=>Math.random()-.5).slice(0,g.pick);}

// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
const canvas=document.getElementById('drawCanvas'),ctx=canvas.getContext('2d');
ctx.lineWidth=6;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#1A9090';
const gCanvas=document.getElementById('guideCanvas'),gCtx=gCanvas.getContext('2d');
const ghostCanvas=document.getElementById('ghostCanvas'),ghostCtx=ghostCanvas.getContext('2d');

function initCanvas(){
  const wrap=document.getElementById('canvasWrap');
  const w=wrap.getBoundingClientRect().width||340;
  const h=530;
  // 所有 canvas 設定相同的物理尺寸
  [canvas,gCanvas,ghostCanvas].forEach(c=>{
    c.width=w; c.height=h;
    c.style.width=w+'px'; c.style.height=h+'px';
  });
}

function gPos(e){const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(canvas.width/r.width),y:(s.clientY-r.top)*(canvas.height/r.height)};}
canvas.addEventListener('mousedown',e=>{if(isGuiding)return;isDrawing=true;const p=gPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
canvas.addEventListener('mousemove',e=>{if(!isDrawing||isGuiding)return;const p=gPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();totalStrokePts++;uQ();});
canvas.addEventListener('mouseup',()=>isDrawing=false);canvas.addEventListener('mouseleave',()=>isDrawing=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(isGuiding)return;isDrawing=true;const p=gPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrawing||isGuiding)return;const p=gPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();totalStrokePts++;uQ();},{passive:false});
canvas.addEventListener('touchend',()=>isDrawing=false);

function uQ(){const q=Math.min(100,Math.round(totalStrokePts*1.2));const f=document.getElementById('qualityFill'),p=document.getElementById('qualityPct');f.style.width=q+'%';f.style.background=q>=80?'linear-gradient(90deg,#66BB6A,#43A047)':q>=50?'linear-gradient(90deg,#FFB74D,#FF7043)':'linear-gradient(90deg,#A8E6CF,#2ABFBF)';p.textContent=q+'%';p.style.color=q>=80?'#2E7D32':q>=50?'#E65100':'var(--teal-d)';}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  gCtx.clearRect(0,0,gCanvas.width,gCanvas.height);
  totalStrokePts=0;
  document.getElementById('qualityFill').style.width='0%';
  document.getElementById('qualityFill').style.background='#A4D6C1';
  document.getElementById('qualityPct').textContent='0%';
  document.getElementById('qualityPct').style.color='var(--teal-d)';
}

// ── ★ GHOST: 全部用 canvas 精確繪製，絕對置中 ★ ──────────────────────────────
function drawGhostShape(){
  ghostCtx.clearRect(0,0,ghostCanvas.width,ghostCanvas.height);
  if(traceMode!=='trace')return;
  const sh=currentShape();
  const W=ghostCanvas.width, H=ghostCanvas.height;
  const cx=W/2, cy=H/2;
  // 以畫布中心為基準，按比例縮放（使用 70% 的畫布寬高）
  const scale=Math.min(W,H)*0.70;

  ghostCtx.save();
  ghostCtx.globalAlpha=0.12;
  ghostCtx.strokeStyle='#1A9090';
  ghostCtx.lineWidth=Math.max(8,scale*0.055);
  ghostCtx.lineCap='round';
  ghostCtx.lineJoin='round';

  if(sh.useChar){
    // 漢字：直接用 fillText 居中
    ghostCtx.fillStyle='#1A9090';
    ghostCtx.globalAlpha=0.10;
    const fs=Math.min(W,H)*0.68;
    ghostCtx.font=`900 ${fs}px sans-serif`;
    ghostCtx.textAlign='center';
    ghostCtx.textBaseline='middle';
    ghostCtx.fillText(sh.char, cx, cy);
  } else {
    // SVG 路徑：把 guideStrokes 的歸一化座標對映到畫布中心
    // 先算出所有點的邊界，然後把形狀縮放置中
    const allPts=sh.guideStrokes.flat();
    const xs=allPts.map(p=>p[0]), ys=allPts.map(p=>p[1]);
    const minX=Math.min(...xs), maxX=Math.max(...xs);
    const minY=Math.min(...ys), maxY=Math.max(...ys);
    const rangeX=maxX-minX||1, rangeY=maxY-minY||1;
    // 形狀自身的長寬比
    const aspect=rangeX/rangeY;
    // 可用區域（留 15% 邊距）
    const pad=0.15;
    const aW=W*(1-pad*2), aH=H*(1-pad*2);
    // 按比例縮放以適應區域
    let drawW, drawH;
    if(aW/aH > aspect){ drawH=aH; drawW=drawH*aspect; }
    else{ drawW=aW; drawH=drawW/aspect; }
    const offX=cx-drawW/2, offY=cy-drawH/2;

    function mapX(nx){ return offX+(nx-minX)/rangeX*drawW; }
    function mapY(ny){ return offY+(ny-minY)/rangeY*drawH; }

    sh.guideStrokes.forEach(pts=>{
      ghostCtx.beginPath();
      pts.forEach((p,i)=>{
        const x=mapX(p[0]), y=mapY(p[1]);
        i===0?ghostCtx.moveTo(x,y):ghostCtx.lineTo(x,y);
      });
      ghostCtx.stroke();
    });
  }
  ghostCtx.restore();
}

function updateSpeed(v){const i=parseInt(v)-1;guideSpeed=SV[i];}
function setTraceMode(m){traceMode=m;document.getElementById('btnTrace').className='trace-btn'+(m==='trace'?' active-mode':'');document.getElementById('btnFree').className='trace-btn'+(m==='free'?' active-mode':'');drawGhostShape();clearCanvas();}

function showHint(){
  const sh=currentShape();const W=gCanvas.width,H=gCanvas.height;
  gCtx.save();gCtx.globalAlpha=.18;gCtx.strokeStyle='#1A9090';gCtx.lineWidth=12;gCtx.lineCap='round';gCtx.lineJoin='round';
  if(sh.useChar){
    gCtx.fillStyle='#1A9090';gCtx.font=`900 ${Math.min(W,H)*.65}px sans-serif`;
    gCtx.textAlign='center';gCtx.textBaseline='middle';gCtx.fillText(sh.char,W/2,H/2);
  } else {
    sh.guideStrokes.forEach(pts=>{const cv=catmullRom(pts);gCtx.beginPath();cv.forEach((p,i)=>i?gCtx.lineTo(p.x*W,p.y*H):gCtx.moveTo(p.x*W,p.y*H));gCtx.stroke();});
  }
  gCtx.restore();
  setTimeout(()=>gCtx.clearRect(0,0,gCanvas.width,gCanvas.height),2500);
}

// ── CATMULL-ROM ────────────────────────────────────────────────────────────────
function catmullRom(k,s=22){if(k.length<2)return k.map(([x,y])=>({x,y}));const pts=[],kk=[k[0],...k,k[k.length-1]];for(let i=1;i<kk.length-2;i++){const[p0x,p0y]=kk[i-1],[p1x,p1y]=kk[i],[p2x,p2y]=kk[i+1],[p3x,p3y]=kk[i+2];for(let j=0;j<=s;j++){const t=j/s,t2=t*t,t3=t2*t;pts.push({x:.5*((2*p1x)+(-p0x+p2x)*t+(2*p0x-5*p1x+4*p2x-p3x)*t2+(-p0x+3*p1x-3*p2x+p3x)*t3),y:.5*((2*p1y)+(-p0y+p2y)*t+(2*p0y-5*p1y+4*p2y-p3y)*t2+(-p0y+3*p1y-3*p2y+p3y)*t3)});}}return pts;}
const CC={};
function getCurves(){const sh=currentShape(),k=sh.id;if(CC[k])return CC[k];CC[k]=sh.guideStrokes.map(s=>catmullRom(s));return CC[k];}

// ── GUIDE ANIMATION ───────────────────────────────────────────────────────────
function toggleGuide(){if(isGuiding)skipGuide();else startGuide();}
function startGuide(){stopGuide();clearCanvas();isGuiding=true;document.getElementById('btnGuide').textContent='⏹️ 停止';document.getElementById('btnGuide').classList.add('animating');document.getElementById('guideStatus').classList.add('visible');document.getElementById('speedRow').classList.add('visible');document.getElementById('inkNib').style.display='block';canvas.style.pointerEvents='none';animS(0);}
function skipGuide(){stopGuide();}
function stopGuide(){if(guideAnimId){cancelAnimationFrame(guideAnimId);guideAnimId=null;}isGuiding=false;gCtx.clearRect(0,0,gCanvas.width,gCanvas.height);document.getElementById('btnGuide').textContent='👁 導引';document.getElementById('btnGuide').classList.remove('animating');document.getElementById('guideStatus').classList.remove('visible');document.getElementById('speedRow').classList.remove('visible');document.getElementById('inkNib').style.display='none';canvas.style.pointerEvents='auto';document.querySelectorAll('.stroke-dot').forEach((d,i)=>{d.classList.remove('active-stroke','done-stroke');if(i===0)d.classList.add('active-stroke');});}

function animS(si){
  const cvs=getCurves(),tot=cvs.length;if(si>=tot){setTimeout(()=>stopGuide(),500);return;}
  const cv=cvs[si],W=gCanvas.width,H=gCanvas.height;
  document.getElementById('guideStatusTxt').textContent=tot===1?'✍️ 示範描繪中…':`✍️ 第 ${si+1} 筆示範中…`;
  document.getElementById('guideStrokeBadge').textContent=`筆畫 ${si+1}/${tot}`;
  document.querySelectorAll('.stroke-dot').forEach((d,i)=>{d.classList.remove('active-stroke','done-stroke');if(i<si)d.classList.add('done-stroke');else if(i===si)d.classList.add('active-stroke');});
  gCtx.clearRect(0,0,W,H);dGhost(cv,W,H);
  const drawn=[cv[0]];let cf=0;pN(cv[0].x*W,cv[0].y*H);dSC(cv[0].x*W,cv[0].y*H,si+1);
  function frame(){if(!isGuiding)return;cf+=guideSpeed;if(cf>=cv.length-1)cf=cv.length-1;const ii=Math.floor(cf);while(drawn.length<=ii)drawn.push(cv[drawn.length]);gCtx.clearRect(0,0,W,H);dGhost(cv,W,H);dTrail(drawn,W,H);dSC(cv[0].x*W,cv[0].y*H,si+1);const cur=cv[Math.min(ii,cv.length-1)],nxt=cv[Math.min(ii+1,cv.length-1)];pN(cur.x*W,cur.y*H,nxt.x*W-cur.x*W,nxt.y*H-cur.y*H);dID(cur.x*W,cur.y*H);if(cf<cv.length-1)guideAnimId=requestAnimationFrame(frame);else setTimeout(()=>{if(!isGuiding)return;setTimeout(()=>{if(!isGuiding)return;animS(si+1);},600);},100);}
  guideAnimId=requestAnimationFrame(frame);
}
function dGhost(c,W,H){gCtx.save();gCtx.globalAlpha=.07;gCtx.strokeStyle='#1A9090';gCtx.lineWidth=14;gCtx.lineCap='round';gCtx.lineJoin='round';gCtx.beginPath();c.forEach((p,i)=>i?gCtx.lineTo(p.x*W,p.y*H):gCtx.moveTo(p.x*W,p.y*H));gCtx.stroke();gCtx.restore();}
function dTrail(pts,W,H){if(pts.length<2)return;gCtx.save();gCtx.lineCap='round';gCtx.lineJoin='round';for(let i=1;i<pts.length;i++){const t=i/pts.length,wt=3+7*Math.sin(t*Math.PI);gCtx.lineWidth=Math.max(2,wt);gCtx.strokeStyle=`rgba(${Math.round(26+t*60)},${Math.round(144+t*30)},${Math.round(144-t*40)},0.9)`;gCtx.beginPath();gCtx.moveTo(pts[i-1].x*W,pts[i-1].y*H);gCtx.lineTo(pts[i].x*W,pts[i].y*H);gCtx.stroke();}gCtx.restore();}
function dID(x,y){gCtx.save();const g=gCtx.createRadialGradient(x,y,1,x,y,8);g.addColorStop(0,'rgba(255,107,107,.9)');g.addColorStop(.5,'rgba(255,107,107,.4)');g.addColorStop(1,'rgba(255,107,107,0)');gCtx.fillStyle=g;gCtx.beginPath();gCtx.arc(x,y,8,0,Math.PI*2);gCtx.fill();gCtx.fillStyle='#FF6B6B';gCtx.beginPath();gCtx.arc(x,y,3,0,Math.PI*2);gCtx.fill();gCtx.restore();}
function dSC(x,y,n){gCtx.save();gCtx.strokeStyle='rgba(255,107,107,.3)';gCtx.lineWidth=2;gCtx.beginPath();gCtx.arc(x,y,13,0,Math.PI*2);gCtx.stroke();gCtx.fillStyle='#FF6B6B';gCtx.globalAlpha=.9;gCtx.beginPath();gCtx.arc(x,y,9,0,Math.PI*2);gCtx.fill();gCtx.globalAlpha=1;gCtx.fillStyle='#fff';gCtx.font='bold 10px Nunito,sans-serif';gCtx.textAlign='center';gCtx.textBaseline='middle';gCtx.fillText(n,x,y);gCtx.restore();}
function pN(x,y,dx,dy){const n=document.getElementById('inkNib'),cr=gCanvas.getBoundingClientRect();n.style.left=(x*(cr.width/gCanvas.width)-14)+'px';n.style.top=(y*(cr.height/gCanvas.height)-28)+'px';if(dx!==undefined&&(Math.abs(dx)+Math.abs(dy))>0.001)n.style.transform=`rotate(${Math.atan2(dy,dx)*180/Math.PI-90}deg)`;else n.style.transform='';}

// ── SELECT ────────────────────────────────────────────────────────────────────
function selectShape(idx){
  if(isGuiding)stopGuide();
  currentIdx=idx;
  const sh=currentShape();
  document.getElementById('shapeNameZh').textContent=sh.nameZh;
  document.getElementById('shapeNameEn').textContent=sh.nameEn;
  document.getElementById('shapeDesc').textContent=sh.desc;
  const pb=document.getElementById('previewBox');
  pb.innerHTML=sh.useChar?`<div class="preview-char">${sh.char}</div>`:`<svg viewBox="0 0 44 44" fill="none">${sh.svgPath}</svg>`;
  const sg=document.getElementById('strokeGuide');sg.innerHTML='';
  sh.guideStrokes.forEach((_,i)=>{const sd=document.createElement('div');sd.className='stroke-dot'+(i===0?' active-stroke':'');sd.textContent=i+1;sg.appendChild(sd);});
  document.querySelectorAll('.shape-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  clearCanvas();
  drawGhostShape(); // ★ 切換形狀後重繪ghost
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
function submitCurrent(){
  if(totalStrokePts<3){document.getElementById('btnCheck').style.background='linear-gradient(135deg,#E53935,#EF5350)';setTimeout(()=>document.getElementById('btnCheck').style.background='',600);return;}
  const q=Math.min(100,Math.round(totalStrokePts*1.2)),passed=q>=80;
  results[currentIdx]={id:currentQueue[currentIdx],quality:q,passed};
  document.getElementById('roundHeader').classList.add('visible');
  uRT();uTabs();
  const filled=results.filter(r=>r!==null).length,total=currentQueue.length;
  if(filled>=total){setTimeout(()=>showFinalModal(),300);return;}
  const next=results.findIndex((r,i)=>r===null&&i!==currentIdx);
  if(next!==-1){clearCanvas();selectShape(next);}else setTimeout(()=>showFinalModal(),300);
}

function showFinalModal(){
  const n=currentQueue.length,passed=results.filter(r=>r&&r.passed).length,rate=Math.round((passed/n)*100),star=rate>=80;
  const failedItems=results.filter(r=>r&&!r.passed);
  const circ=2*Math.PI*34;
  document.getElementById('donutFill').setAttribute('stroke-dasharray',`0 ${circ}`);
  document.getElementById('donutFill').setAttribute('stroke',star?'#43A047':'#FF7043');
  document.getElementById('donutPct').textContent=rate+'%';document.getElementById('donutPct').style.fill=star?'#2E7D32':'#E65100';
  setTimeout(()=>document.getElementById('donutFill').setAttribute('stroke-dasharray',`${(rate/100)*circ} ${circ}`),100);
  document.getElementById('modalEmoji').textContent=star?'🌟':'😅';
  document.getElementById('modalTitle').textContent=star?PP[Math.floor(Math.random()*PP.length)]:FE[Math.floor(Math.random()*FE.length)];
  document.getElementById('modalTitle').className='modal-title '+(star?'pass':'fail');
  document.getElementById('modalSub').textContent=`${GROUPS[currentGrp].label}・良率 ${rate}%${star?' ⭐':''}`;
  const grid=document.getElementById('breakdownGrid');grid.innerHTML='';
  for(let i=0;i<5;i++){const r=results[i];const cell=document.createElement('div');cell.className='bd-cell '+(r?(r.passed?'b-pass':'b-fail'):'b-empty');const sh=r?SHAPES[r.id]:null;cell.innerHTML=`<div class="bd-shape">${sh?sh.emoji:'·'}</div><div class="bd-q">${r?r.quality+'%':''}</div>`;grid.appendChild(cell);}
  if(!star&&failedItems.length){document.getElementById('tipsSection').style.display='block';const tl=document.getElementById('tipsList');tl.innerHTML='';aT(tl,'①','「'+failedItems.map(r=>SHAPES[r.id].nameZh).join('、')+'」需要再練習');aT(tl,'💡','可以再練習幾次！');}
  else document.getElementById('tipsSection').style.display='none';
  document.getElementById('btnRetry').className='modal-btn btn-retry'+(failedItems.length&&!star?'':' hidden');
  document.getElementById('btnReroll').className='modal-btn btn-reroll'+(GROUPS[currentGrp].reroll?'':' hidden');
  document.getElementById('scoreModalBg').classList.add('show');savePractice();
  if(star){if(!groupDone[currentGrp]){groupDone[currentGrp]=true;updateGroupTabs();savePractice();}setTimeout(()=>{document.getElementById('scoreModalBg').classList.remove('show');showStarAward();},600);}
}
function aT(c,i,t){const d=document.createElement('div');d.className='tip-item';d.innerHTML=`<div class="tip-icon">${i}</div><div class="tip-text">${t}</div>`;c.appendChild(d);}
function closeModal(){document.getElementById('scoreModalBg').classList.remove('show');}
function showStarAward(){document.getElementById('starAwardGroup').textContent=GROUPS[currentGrp].label+'完成！';document.getElementById('starModalBg').classList.add('show');addGlobalStar();fireBurst();}
function closeStarModal(next){document.getElementById('starModalBg').classList.remove('show');if(next){const ng=(currentGrp+1)%3;switchGroup(ng);}}
function startRetry(){const f=results.map((r,i)=>r&&!r.passed?i:null).filter(i=>i!==null);closeModal();results=Array(currentQueue.length).fill(null);document.getElementById('roundHeader').classList.remove('visible');clearCanvas();selectShape(f[0]??0);uRT();uTabs();}
function startNewRound(){closeModal();rerollShapes();}

function switchGroup(gi){if(isGuiding)stopGuide();currentGrp=gi;rerollShapes();document.querySelectorAll('.group-tab').forEach((t,i)=>t.classList.toggle('active',i===gi));document.getElementById('rerollBtn').className='reroll-btn'+(GROUPS[gi].reroll?' show':'');document.getElementById('selectorLabel').textContent=`選擇形狀・${GROUPS[gi].label}`;}
function rerollShapes(){if(isGuiding)stopGuide();currentQueue=buildQueue(currentGrp);results=Array(currentQueue.length).fill(null);document.getElementById('roundHeader').classList.remove('visible');buildShapeTabs();buildRoundTrack();clearCanvas();selectShape(0);uRT();}
function buildShapeTabs(){const cont=document.getElementById('shapeTabs');cont.innerHTML='';currentQueue.forEach((id,i)=>{const sh=SHAPES[id];const btn=document.createElement('button');btn.className='shape-tab'+(i===currentIdx?' active':'');btn.innerHTML=sh.useChar?`<div class="char-icon">${sh.char}</div><div class="shape-tab-label">${sh.nameZh}</div>`:`<svg viewBox="0 0 44 44" fill="none">${sh.svgPath}</svg><div class="shape-tab-label">${sh.nameZh}</div>`;btn.onclick=()=>selectShape(i);cont.appendChild(btn);});}
function uTabs(){document.querySelectorAll('.shape-tab').forEach((t,i)=>{t.classList.remove('pass','fail');if(results[i])t.classList.add(results[i].passed?'pass':'fail');t.classList.toggle('active',i===currentIdx);});}
function updateGroupTabs(){GROUPS.forEach((g,i)=>{document.getElementById('tab'+i).classList.toggle('grp-done',groupDone[i]);});}
function buildRoundTrack(){const tr=document.getElementById('roundTrack');tr.innerHTML='';currentQueue.forEach((id,i)=>{const sh=SHAPES[id];const cell=document.createElement('div');cell.className='round-cell'+(i===currentIdx?' current':'');cell.textContent=sh.emoji;cell.onclick=()=>{if(!results[i])selectShape(i);};const ic=document.createElement('div');ic.className='rc-icon';cell.appendChild(ic);tr.appendChild(cell);});}
function uRT(){const n=currentQueue.length,f=results.filter(r=>r!==null).length,p=results.filter(r=>r&&r.passed).length,rate=Math.round((p/n)*100);document.getElementById('roundBadge').textContent=f+' / '+n;document.getElementById('roundFill').style.width=rate+'%';document.getElementById('roundFill').style.background=rate>=80?'linear-gradient(90deg,#66BB6A,#43A047)':rate>=50?'linear-gradient(90deg,#FFB74D,#FF7043)':'linear-gradient(90deg,#A8E6CF,#2ABFBF)';document.getElementById('roundPct').textContent=rate+'%';document.getElementById('roundPct').style.color=rate>=80?'#2E7D32':rate>=50?'#E65100':'var(--teal-d)';document.querySelectorAll('.round-cell').forEach((cell,i)=>{cell.classList.remove('pass','fail','current');if(results[i]){cell.classList.add(results[i].passed?'pass':'fail');cell.querySelector('.rc-icon').textContent=results[i].passed?'✓':'△';}else if(i===currentIdx)cell.classList.add('current');});}

function addGlobalStar(){const ids=['s1','s2','s3'];for(let i=0;i<3;i++){const el=document.getElementById(ids[i]);if(el.textContent==='☆'){el.textContent='⭐';el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),500);return;}}}
function fireBurst(){const em=['⭐','✨','🌟','💫','✨','🎉'];const b=document.getElementById('starburst');b.innerHTML='';b.classList.add('show');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='burst-particle';p.textContent=em[Math.floor(Math.random()*em.length)];const a=(i/20)*Math.PI*2,d=80+Math.random()*130;p.style.cssText=`left:50%;top:40%;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d-70}px;animation-delay:${Math.random()*.3}s;animation-duration:${.9+Math.random()*.6}s;`;b.appendChild(p);}setTimeout(()=>b.classList.remove('show'),1800);}
function confirmExit(){if(isGuiding)stopGuide();document.getElementById('confirmBg').classList.add('show');}
function cancelExit(e){if(e&&e.target!==document.getElementById('confirmBg'))return;document.getElementById('confirmBg').classList.remove('show');}
function doExit(){document.getElementById('confirmBg').classList.remove('show');document.body.style.opacity='0';document.body.style.transition='opacity .35s';setTimeout(()=>document.body.style.opacity='1',350);}

// ── INIT ──────────────────────────────────────────────────────────────────────
initCanvas();
switchGroup(0);
loadPractice();
window.addEventListener('resize',()=>{initCanvas();if(isGuiding)stopGuide();drawGhostShape();});

// ── SHARED STAR STATE ─────────────────────────────────────────────
const _APP_KEY='ultraman_app_state';
function _loadApp(){try{const s=localStorage.getItem(_APP_KEY);return s?JSON.parse(s):{}}catch(e){return {};}}
function _saveApp(p){try{const c=_loadApp();localStorage.setItem(_APP_KEY,JSON.stringify(Object.assign({},c,p)));}catch(e){}}
function _getStars(){return Math.min(3,parseInt(_loadApp().stars)||0);}
function _setStars(n){
  n=Math.max(0,Math.min(3,n));
  _saveApp({stars:n});
  _syncPips(n);
  try{window.parent.postMessage({type:'starUpdate',stars:n},'*');}catch(e){}
}
function _syncPips(n){
  ['s1','s2','s3'].forEach((id,i)=>{
    const el=document.getElementById(id);if(!el)return;
    el.textContent=i<n?'⭐':'☆';
  });
}
function directAwardStar(){
  const cur=_getStars();
  if(cur>=3){_starToast('已集滿 3 顆星！快去獎勵頁抽力霸王卡 🦸');return;}
  _setStars(cur+1);
  const n=_getStars();
  _starToast(n>=3?'⭐⭐⭐ 集滿啦！快去獎勵頁抽卡！':`獲得一顆星星！還差 ${3-n} 顆`);
}
function addGlobalStar(){directAwardStar();}  // backward compat
function _starToast(msg){
  let t=document.getElementById('_st');
  if(!t){t=document.createElement('div');t.id='_st';
    t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(10,36,114,.95);border:1.5px solid rgba(66,165,245,.4);border-radius:14px;padding:11px 20px;font-size:13px;font-weight:700;color:#fff;z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.transform='translateX(-50%) translateY(100px)',3000);
}
window.addEventListener('load',()=>_syncPips(_getStars()));

// ── 練習進度儲存 ─────────────────────────────────────────────────
const _PKEY='ultraman_practice_state_sha';
function _pLoad(){try{const s=localStorage.getItem(_PKEY);return s?JSON.parse(s):{};}catch(e){return {};}}
function savePractice(){
  try{
    localStorage.setItem(_PKEY, JSON.stringify({groupDone}));
  }catch(e){}
}
function loadPractice(){
  const s=_pLoad();
  if(Array.isArray(s.groupDone)){
    s.groupDone.forEach((v,i)=>{ if(i<groupDone.length) groupDone[i]=!!v; });
  }
}
// Auto-save on hide/leave
document.addEventListener('visibilitychange',function(){if(document.hidden)savePractice();});
window.addEventListener('pagehide',savePractice);
</script>
